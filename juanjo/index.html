<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Álbum Panini Mundial 2026 - Juan José Areiza Estrada</title>
<meta name="description" content="Tracker del álbum Panini FIFA World Cup 2026 - Juan José Areiza Estrada">
<meta name="theme-color" content="#000000">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a1628; --surface: #0f1f3d; --border: #1e3a5f;
    --gold: #ffd700; --green: #22c55e; --green-l: #34d399;
    --red: #f87171; --yellow: #fbbf24; --blue: #3b82f6;
    --text: #e2e8f0; --muted: #94a3b8; --dim: #64748b; --dark: #475569;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Barlow Condensed', 'Segoe UI', system-ui, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family: var(--font-body); background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
  button { font-family:inherit; cursor:pointer; }
  input { font-family:inherit; }

  /* Header */
  .header { background:linear-gradient(135deg,#000 0%,#111827 50%,#1a1a2e 100%); padding:14px 16px 12px; position:sticky; top:0; z-index:100; border-bottom:3px solid var(--gold); }
  .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .header-left { display:flex; align-items:center; gap:10px; }
  .header-logo { width:48px; height:48px; object-fit:contain; border-radius:6px; }
  .header-title { font-family:var(--font-display); font-size:16px; color:#fff; letter-spacing:1.5px; line-height:1.1; }
  .header-name { font-size:11px; color:var(--gold); letter-spacing:.5px; font-weight:600; }
  .header-pct { font-family:var(--font-display); font-size:32px; color:var(--gold); line-height:1; text-align:right; }
  .header-pct-label { font-size:10px; color:#b3d9ff; text-align:right; }

  /* Progress bar */
  .progress-track { background:rgba(0,0,0,.3); border-radius:6px; height:10px; overflow:hidden; margin-bottom:10px; }
  .progress-fill { height:100%; border-radius:6px; background:linear-gradient(90deg,var(--gold),#ff8c00); transition:width .5s ease; }

  /* Stats row */
  .stats-row { display:flex; gap:8px; }
  .stat-card { flex:1; background:rgba(0,0,0,.25); border-radius:8px; padding:6px 8px; text-align:center; }
  .stat-label { font-size:10px; color:var(--muted); letter-spacing:1px; }
  .stat-value { font-family:var(--font-display); font-size:22px; }

  /* Tabs */
  .tabs { display:flex; background:var(--surface); border-bottom:1px solid var(--border); }
  .tab-btn { flex:1; padding:10px 0; border:none; font-size:13px; font-weight:700; letter-spacing:1px; font-family:var(--font-body); background:transparent; color:var(--dim); border-bottom:2px solid transparent; transition:all .2s; }
  .tab-btn.active { background:#003580; color:var(--gold); border-bottom-color:var(--gold); }

  /* Content */
  .content { padding:12px; }

  /* Section titles */
  .section-title { font-family:var(--font-display); font-size:18px; color:var(--gold); letter-spacing:2px; margin-bottom:8px; }

  /* Special sticker grid */
  .special-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:16px; }

  /* Sticker cell */
  .sticker-cell { padding:8px 4px; border-radius:8px; border:2px solid var(--border); background:rgba(30,58,95,.6); text-align:center; cursor:pointer; transition:all .15s; }
  .sticker-cell[data-state="pegada"] { background:rgba(34,197,94,.2); border-color:var(--green); }
  .sticker-cell[data-state="repetida"] { background:rgba(251,191,36,.2); border-color:var(--yellow); }
  .sticker-code { font-weight:700; font-size:11px; color:var(--dim); }
  .sticker-cell[data-state="pegada"] .sticker-code { color:var(--green-l); }
  .sticker-cell[data-state="repetida"] .sticker-code { color:var(--yellow); }
  .sticker-name { font-size:9px; margin-top:2px; opacity:.8; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sticker-rep-badge { font-size:8px; margin-top:2px; }

  /* Teams grid */
  .teams-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .team-card { padding:10px; border-radius:10px; border:2px solid var(--border); background:rgba(30,58,95,.5); cursor:pointer; text-align:left; transition:all .15s; }
  .team-card.complete { background:rgba(34,197,94,.15); border-color:var(--green); }
  .team-top { display:flex; align-items:center; justify-content:space-between; }
  .team-info { display:flex; align-items:center; gap:6px; }
  .team-flag { font-size:20px; }
  .team-name { font-weight:700; font-size:14px; color:var(--text); }
  .team-sub { font-size:10px; color:var(--dim); }
  .team-pct { font-family:var(--font-display); font-size:20px; }
  .team-progress { background:rgba(0,0,0,.3); border-radius:4px; height:4px; margin-top:6px; overflow:hidden; }
  .team-progress-fill { height:100%; border-radius:4px; transition:width .3s; }

  /* Back button */
  .back-btn { background:rgba(30,58,95,.6); border:1px solid var(--border); color:#7dd3fc; padding:6px 14px; border-radius:6px; font-size:12px; font-weight:600; margin-bottom:12px; }

  /* Album page */
  .album-page { border-radius:16px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,.4); }
  .album-header { padding:16px 16px 10px; }
  .album-we-are { font-size:11px; letter-spacing:4px; color:var(--muted); }
  .album-country { font-family:var(--font-display); font-size:28px; color:#fff; letter-spacing:2px; line-height:1; }
  .album-meta { font-size:11px; color:var(--muted); }
  .album-hint { padding:6px 16px; font-size:10px; color:var(--dim); text-align:center; border-bottom:1px solid rgba(255,255,255,.05); }
  .album-stickers { padding:12px; display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }

  /* Player sticker in album */
  .player-sticker { padding:8px 4px; border-radius:10px; border:2px solid #1e293b; background:rgba(15,23,42,.8); text-align:center; aspect-ratio:3/4; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; position:relative; transition:all .15s; }
  .player-sticker .icon { font-size:20px; }
  .player-sticker .code { font-family:var(--font-body); font-weight:700; font-size:11px; color:var(--dark); margin-top:4px; }
  .player-sticker .pname { font-size:8px; color:#334155; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:100%; padding:0 2px; }
  .player-sticker .badge { position:absolute; top:3px; right:3px; border-radius:50%; width:14px; height:14px; display:flex; align-items:center; justify-content:center; font-size:8px; }

  .player-sticker[data-state="pegada"] { border-color:currentColor; box-shadow:0 0 12px rgba(0,0,0,.2); }
  .player-sticker[data-state="pegada"] .icon { font-size:22px; }
  .player-sticker[data-state="pegada"] .code { color:var(--text); }
  .player-sticker[data-state="pegada"] .pname { color:var(--muted); }
  .player-sticker[data-state="pegada"] .badge { background:var(--green); }

  .player-sticker[data-state="repetida"] { background:linear-gradient(145deg,rgba(251,191,36,.3),rgba(251,191,36,.15)); border-color:var(--yellow); box-shadow:0 0 12px rgba(251,191,36,.2); }
  .player-sticker[data-state="repetida"] .code { color:var(--yellow); }
  .player-sticker[data-state="repetida"] .pname { color:var(--yellow); }
  .player-sticker[data-state="repetida"] .badge { background:var(--yellow); }

  .player-sticker .icon-empty { opacity:.3; font-size:20px; }

  /* List view */
  .search-input { width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:13px; margin-bottom:8px; }
  .filter-row { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
  .filter-btn { padding:5px 10px; border-radius:6px; border:none; font-size:11px; font-weight:600; background:rgba(30,58,95,.5); color:var(--muted); }
  .filter-btn.active { background:#003580; color:var(--gold); }
  .list-container { display:flex; flex-direction:column; gap:3px; }
  .list-item { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-radius:8px; border:none; cursor:pointer; text-align:left; background:rgba(15,23,42,.6); border-left:3px solid var(--border); width:100%; }
  .list-item[data-state="pegada"] { background:rgba(34,197,94,.1); border-left-color:var(--green); }
  .list-item[data-state="repetida"] { background:rgba(251,191,36,.1); border-left-color:var(--yellow); }
  .list-item-left { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
  .list-flag { font-size:16px; flex-shrink:0; }
  .list-code { font-weight:700; font-size:13px; }
  .list-name { font-size:12px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .list-section { font-size:10px; color:var(--dark); }
  .list-status { font-size:12px; flex-shrink:0; }

  /* Sync panel */
  .sync-panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:16px; }
  .sync-title { font-family:var(--font-display); font-size:16px; color:var(--gold); letter-spacing:1px; margin-bottom:10px; }
  .sync-btns { display:flex; gap:8px; flex-wrap:wrap; }
  .sync-btn { padding:8px 14px; border-radius:8px; border:none; font-size:12px; font-weight:600; color:#fff; transition:all .15s; }
  .sync-btn:active { transform:scale(.96); }
  .sync-export { background:#2563eb; }
  .sync-import { background:#7c3aed; }
  .sync-link { background:#059669; }
  .sync-reset { background:#dc2626; }

  /* Toast */
  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#1e293b; color:var(--text); padding:10px 20px; border-radius:10px; font-size:13px; font-weight:600; z-index:999; border:1px solid var(--border); box-shadow:0 8px 24px rgba(0,0,0,.5); opacity:0; transition:opacity .3s; pointer-events:none; }
  .toast.show { opacity:1; }

  /* Footer */
  .footer { text-align:center; padding:20px 12px 32px; font-size:10px; color:#334155; }

  /* Empty state */
  .empty-state { text-align:center; padding:32px; color:var(--dark); }

  /* Modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; max-width:400px; width:100%; }
  .modal-title { font-family:var(--font-display); font-size:20px; color:var(--gold); margin-bottom:12px; }
  .modal-text { font-size:13px; color:var(--muted); margin-bottom:16px; line-height:1.5; }
  .modal-btns { display:flex; gap:8px; }
  .modal-btn { flex:1; padding:10px; border:none; border-radius:8px; font-size:13px; font-weight:600; }
  .modal-cancel { background:rgba(30,58,95,.6); color:var(--muted); }
  .modal-confirm { background:#dc2626; color:#fff; }

  @media(min-width:600px) {
    .special-grid { grid-template-columns:repeat(5,1fr); }
    .teams-grid { grid-template-columns:repeat(3,1fr); }
    .album-stickers { grid-template-columns:repeat(5,1fr); }
  }
</style>

  {p:"UZB",n:"Uzbekistán",f:"🇺🇿",cl:"#1EB53A",pl:["Emblema","E. Shomurodov GK","H. Aliqulov","A. Khusanov","A. Mozgovoy","D. Khashimov","S. Nasrullayev","I. Tukhtakhujaev","O. Shukurov","J. Masharipov","J. Iskanderov","O. Urunov","Foto Equipo","K. Norchaev","A. Fayzullaev","I. Yuldoshev","A. Turgunboev","E. Shomurodov","B. Abdikholiqov","D. Khamdamov"]},
];

// Build ordered codes
const ALL_CODES = [];
const STICKER_MAP = {};
INTRO.forEach(s => { ALL_CODES.push(s.c); STICKER_MAP[s.c] = { code:s.c, name:s.n, section:s.s, team:null }; });
T.forEach(team => {
  for(let i=1;i<=20;i++){
    const c = team.p+i;
    ALL_CODES.push(c);
    STICKER_MAP[c] = { code:c, name:team.pl[i-1], section:team.n, team };
  }
});
const TOTAL = ALL_CODES.length;

// ══════════════════════════════════════════════════════════════
// PERSISTENCE
// ══════════════════════════════════════════════════════════════
const STORAGE_KEY = "panini2026_jj";
function loadState() {
  // 1. Check URL hash first
  const hash = location.hash.slice(1);
  if(hash && hash.startsWith("s=")) {
    try {
      const decoded = atob(hash.slice(2));
      const st = {};
      for(let i=0;i<decoded.length&&i<ALL_CODES.length;i++){
        if(decoded[i]==='1') st[ALL_CODES[i]]='pegada';
        else if(decoded[i]==='2') st[ALL_CODES[i]]='repetida';
      }
      // Save to localStorage too
      localStorage.setItem(STORAGE_KEY, JSON.stringify(st));
      // Clean URL without reload
      history.replaceState(null,'',location.pathname);
      return st;
    } catch(e){ console.log("Bad URL state"); }
  }
  // 2. localStorage
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  } catch(e){}
  return {};
}

function saveState(st) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(st)); } catch(e){}
}

function encodeStateToURL(st) {
  let s = '';
  ALL_CODES.forEach(c => {
    if(st[c]==='pegada') s+='1';
    else if(st[c]==='repetida') s+='2';
    else s+='0';
  });
  return location.origin + location.pathname + '#s=' + btoa(s);
}

function exportJSON(st) {
  const data = JSON.stringify(st, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'album-panini-2026-juanjose.json'; a.click();
  URL.revokeObjectURL(url);
}

function importJSON(callback) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const st = JSON.parse(ev.target.result);
        callback(st);
      } catch(e){ alert('Archivo inválido'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ══════════════════════════════════════════════════════════════
// APP STATE & RENDERING
// ══════════════════════════════════════════════════════════════
let state = loadState();
let activeTab = 'album';
let selectedTeam = null;
let searchTerm = '';
let listFilter = 'all';
let toastTimeout = null;
let showResetModal = false;

function getStats() {
  let pegadas=0, repetidas=0;
  Object.values(state).forEach(v => {
    if(v==='pegada') pegadas++;
    if(v==='repetida'){ pegadas++; repetidas++; }
  });
  return { total:TOTAL, pegadas, repetidas, faltan:TOTAL-pegadas, pct:Math.round((pegadas/TOTAL)*100) };
}

function toggleSticker(code) {
  const cur = state[code] || 'empty';
  if(cur==='empty') state[code]='pegada';
  else if(cur==='pegada') state[code]='repetida';
  else delete state[code];
  saveState(state);
  render();
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(()=> el.classList.remove('show'), 2500);
}

function render() {
  const stats = getStats();
  const app = document.getElementById('app');

  let html = `
  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <img src="${LOGO_B64}" alt="WC26" class="header-logo">
        <div>
          <div class="header-title">ÁLBUM PANINI MUNDIAL 2026</div>
          <div class="header-name">Juan José Areiza Estrada</div>
        </div>
      </div>
      <div>
        <div class="header-pct">${stats.pct}%</div>
        <div class="header-pct-label">COMPLETADO</div>
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${stats.pct}%"></div></div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">✅ PEGADAS</div><div class="stat-value" style="color:var(--green-l)">${stats.pegadas}</div></div>
      <div class="stat-card"><div class="stat-label">❌ FALTAN</div><div class="stat-value" style="color:var(--red)">${stats.faltan}</div></div>
      <div class="stat-card"><div class="stat-label">🔄 REPETIDAS</div><div class="stat-value" style="color:var(--yellow)">${stats.repetidas}</div></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn ${activeTab==='album'?'active':''}" onclick="activeTab='album';selectedTeam=null;render()">📖 Álbum</button>
    <button class="tab-btn ${activeTab==='lista'?'active':''}" onclick="activeTab='lista';selectedTeam=null;render()">📋 Lista</button>
    <button class="tab-btn ${activeTab==='sync'?'active':''}" onclick="activeTab='sync';selectedTeam=null;render()">☁️ Sync</button>
  </div>`;

  // ── ALBUM TAB ──
  if(activeTab==='album' && !selectedTeam) {
    html += `<div class="content">`;
    // Specials
    html += `<div class="section-title">⚽ INTRODUCCIÓN & MUSEO FIFA</div><div class="special-grid">`;
    INTRO.forEach(s => {
      const st = state[s.c]||'empty';
      html += `<div class="sticker-cell" data-state="${st}" onclick="toggleSticker('${s.c}')">
        <div class="sticker-code">${s.c}</div>
        <div class="sticker-name">${s.n}</div>
        ${st==='repetida'?'<div class="sticker-rep-badge">🔄 REP</div>':''}
      </div>`;
    });
    html += `</div>`;

    // Teams
    html += `<div class="section-title">🌍 SELECCIONES (${T.length})</div><div class="teams-grid">`;
    T.forEach(team => {
      let owned=0;
      for(let i=1;i<=20;i++){ const v=state[team.p+i]; if(v==='pegada'||v==='repetida') owned++; }
      const pct=Math.round((owned/20)*100);
      const complete=owned===20;
      const pctColor = complete?'var(--green-l)':pct>50?'var(--yellow)':'var(--dim)';
      const barColor = complete?'var(--green)':pct>50?'var(--yellow)':'var(--blue)';
      html += `<div class="team-card ${complete?'complete':''}" onclick="selectedTeam=T[${T.indexOf(team)}];render()">
        <div class="team-top">
          <div class="team-info">
            <span class="team-flag">${team.f}</span>
            <div><div class="team-name">${team.n}</div><div class="team-sub">${team.p} · ${owned}/20</div></div>
          </div>
          <div class="team-pct" style="color:${pctColor}">${pct}%</div>
        </div>
        <div class="team-progress"><div class="team-progress-fill" style="width:${pct}%;background:${barColor}"></div></div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // ── TEAM DETAIL ──
  if(activeTab==='album' && selectedTeam) {
    const t = selectedTeam;
    let owned=0;
    for(let i=1;i<=20;i++){ const v=state[t.p+i]; if(v==='pegada'||v==='repetida') owned++; }
    html += `<div class="content">
      <button class="back-btn" onclick="selectedTeam=null;render()">← Volver</button>
      <div class="album-page" style="background:linear-gradient(145deg,${t.cl}22,${t.cl}11,#0f172a);border:2px solid ${t.cl}66">
        <div class="album-header" style="background:linear-gradient(90deg,${t.cl}33,transparent);border-bottom:1px solid ${t.cl}44">
          <div class="album-we-are">WE ARE</div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:36px">${t.f}</span>
            <div>
              <div class="album-country">${t.n.toUpperCase()}</div>
              <div class="album-meta">${owned}/20 láminas · ${t.p}1 – ${t.p}20</div>
            </div>
          </div>
        </div>
        <div class="album-hint">Toca: vacía → ✅ pegada → 🔄 repetida → vacía</div>
        <div class="album-stickers">`;

    for(let i=0;i<20;i++){
      const code = t.p+(i+1);
      const st = state[code]||'empty';
      const player = t.pl[i];
      const isE = i===0, isT = i===12;
      const emIcon = isE?'🏅':isT?'📸':'👤';
      const filIcon = isE?'🏅':isT?'📸':'⚽';

      if(st==='empty'){
        html += `<div class="player-sticker" data-state="empty" onclick="toggleSticker('${code}')">
          <div class="icon-empty">${emIcon}</div>
          <div class="code">${code}</div>
          <div class="pname">${player}</div>
        </div>`;
      } else {
        html += `<div class="player-sticker" data-state="${st}" style="${st==='pegada'?`color:${t.cl};border-color:${t.cl};background:linear-gradient(145deg,${t.cl}44,${t.cl}22)`:''}" onclick="toggleSticker('${code}')">
          <div class="icon">${filIcon}</div>
          <div class="code">${code}</div>
          <div class="pname">${player}</div>
          <div class="badge">${st==='pegada'?'✓':'🔄'}</div>
        </div>`;
      }
    }
    html += `</div></div></div>`;
  }

  // ── LIST TAB ──
  if(activeTab==='lista') {
    html += `<div class="content">
      <input class="search-input" type="text" placeholder="🔍 Buscar por código o nombre..." value="${searchTerm}" oninput="searchTerm=this.value;render()">
      <div class="filter-row">
        <button class="filter-btn ${listFilter==='all'?'active':''}" onclick="listFilter='all';render()">Todas (${TOTAL})</button>
        <button class="filter-btn ${listFilter==='pegadas'?'active':''}" onclick="listFilter='pegadas';render()">Pegadas (${stats.pegadas})</button>
        <button class="filter-btn ${listFilter==='faltan'?'active':''}" onclick="listFilter='faltan';render()">Faltan (${stats.faltan})</button>
        <button class="filter-btn ${listFilter==='repetidas'?'active':''}" onclick="listFilter='repetidas';render()">Repetidas (${stats.repetidas})</button>
      </div>
      <div class="list-container">`;

    let items = ALL_CODES.map(c=>STICKER_MAP[c]);
    if(searchTerm){
      const q=searchTerm.toLowerCase();
      items=items.filter(s=>s.code.toLowerCase().includes(q)||s.name.toLowerCase().includes(q)||s.section.toLowerCase().includes(q));
    }
    if(listFilter==='pegadas') items=items.filter(s=>{const v=state[s.code];return v==='pegada'||v==='repetida';});
    if(listFilter==='repetidas') items=items.filter(s=>state[s.code]==='repetida');
    if(listFilter==='faltan') items=items.filter(s=>!state[s.code]||state[s.code]==='empty');

    items.forEach(s=>{
      const st=state[s.code]||'empty';
      const codeColor=st==='empty'?'var(--dim)':st==='pegada'?'var(--green-l)':'var(--yellow)';
      html += `<button class="list-item" data-state="${st}" onclick="toggleSticker('${s.code}')">
        <div class="list-item-left">
          ${s.team?`<span class="list-flag">${s.team.f}</span>`:''}
          <div style="min-width:0">
            <div style="display:flex;align-items:center;gap:6px">
              <span class="list-code" style="color:${codeColor}">${s.code}</span>
              <span class="list-name">${s.name}</span>
            </div>
            <div class="list-section">${s.section}</div>
          </div>
        </div>
        <div class="list-status">${st==='empty'?'—':st==='pegada'?'✅':'✅🔄'}</div>
      </button>`;
    });

    if(items.length===0) html += `<div class="empty-state">No se encontraron láminas.</div>`;
    html += `</div></div>`;
  }

  // ── SYNC TAB ──
  if(activeTab==='sync') {
    html += `<div class="content">
      <div class="sync-panel">
        <div class="sync-title">📱 SINCRONIZAR ENTRE DISPOSITIVOS</div>
        <p style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5">
          Genera un enlace con tu progreso actual. Ábrelo en cualquier navegador o dispositivo para cargar tu álbum automáticamente.
        </p>
        <div class="sync-btns">
          <button class="sync-btn sync-link" onclick="const url=encodeStateToURL(state);navigator.clipboard.writeText(url).then(()=>showToast('✅ Enlace copiado al portapapeles'));"><b>🔗 Copiar enlace de sincronización</b></button>

        </p>
        <div class="sync-btns">
          <button class="sync-btn sync-reset" onclick="showResetModal=true;render()">🗑️ Borrar todo</button>
        </div>

  }

  html += `<div class="footer">Juan José Areiza Estrada · Álbum Panini Mundial 2026 🏆</div>`;
  html += `<div id="toast" class="toast"></div>`;

  // Reset modal
  if(showResetModal) {
    html += `<div class="modal-overlay" onclick="showResetModal=false;render()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title">⚠️ CONFIRMAR REINICIO</div>
        <div class="modal-text">¿Estás seguro de que quieres borrar todo el progreso del álbum? Esta acción no se puede deshacer.</div>
        <div class="modal-btns">
          <button class="modal-btn modal-cancel" onclick="showResetModal=false;render()">Cancelar</button>
          <button class="modal-btn modal-confirm" onclick="state={};saveState(state);showResetModal=false;render();showToast('🗑️ Álbum reiniciado')">Sí, borrar todo</button>
        </div>
      </div>
    </div>`;
  }

  app.innerHTML = html;
}

// Initial render
render();
</script>
